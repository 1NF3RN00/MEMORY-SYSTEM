services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory-middleware-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_middleware
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory_middleware"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
